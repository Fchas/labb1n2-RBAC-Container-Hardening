# Service Account for Redis
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis-sa
  namespace: lillteamet

---
# Service Account for Frontend
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-sa
  namespace: lillteamet

---
# Service Account for API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-sa
  namespace: lillteamet

---
# Service Account for Monitor (keep all existing RBAC intact)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: monitor-sa
  namespace: lillteamet
  labels:
    app: team-monitor

---
# Role: What the monitor can read
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: monitor-role
  namespace: lillteamet
rules:
# Allow reading pods and services
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list", "watch"]

# Allow reading deployments
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]

# Allow reading ingress
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch"]

---
# RoleBinding: Connects ServiceAccount to Role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: monitor-binding
  namespace: lillteamet
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: monitor-role
subjects:
- kind: ServiceAccount
  name: monitor-sa
  namespace: lillteamet

---
# Service Account for ACME HTTP Solver
apiVersion: v1
kind: ServiceAccount
metadata:
  name: acmesolver-sa
  namespace: lillteamet