# Team Monitor Deployment
# Observes namespace resources and reports metrics

apiVersion: apps/v1
kind: Deployment
metadata:
  name: team-monitor
  namespace: lillteamet
  labels:
    app: team-monitor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: team-monitor
  template:
    metadata:
      labels:
        app: team-monitor
    spec:
      serviceAccountName: monitor-sa
      containers:
      - name: monitor
        image: registry.lillteamet.local/monitor-hardened:v1
        ports:
        - containerPort: 9090
        resources:
          requests:
            cpu: "25m"
            memory: "32Mi"
          limits:
            cpu: "50m"
            memory: "64Mi"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]