apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: lillteamet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: api
        image: gcr.io/chas-devsecops-2026/team-dashboard-api:v1
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "25m"
            memory: "128Mi"
          limits:
            cpu: "100m"
            memory: "256Mi"
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: "64Mi"