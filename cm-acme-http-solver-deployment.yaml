apiVersion: apps/v1
kind: Deployment
metadata:
  name: cm-acme-http-solver
  namespace: lillteamet
  labels:
    app: acmesolver
spec:
  replicas: 2
  selector:
    matchLabels:
      app: acmesolver
  template:
    metadata:
      labels:
        app: acmesolver
    spec:
      serviceAccountName: acmesolver-sa
      containers:
      - name: acmesolver
        image: registry.lillteamet.local/cert-manager-acmesolver-hardened:v1
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10