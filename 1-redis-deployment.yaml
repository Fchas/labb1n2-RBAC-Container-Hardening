# Redis - In-Memory Cache/Database
# Used by the API to store visit counts and session data

apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: lillteamet
  labels:
    app: redis
    tier: database
spec:
  replicas: 2
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        tier: database
    spec:
      serviceAccountName: redis-sa
      containers:
      - name: redis
        image: registry.lillteamet.local/redis-distroless:v1
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: lillteamet
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
  selector:
    app: redis