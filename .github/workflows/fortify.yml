# .github/workflows/fortify.yml
name: Fortify Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  fortify-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Fortify scan
        uses: fortify/github-action@ef5539bf4bd9c45c0bd971978f635a69eae55297
        with:
          sast-scan: true
          debricked-sca-scan: true
        env:
          # Fortify authentication
          FOD_URL: https://ams.fortify.com
          FOD_TENANT: ${{ secrets.FOD_TENANT }}
          FOD_USER: ${{ secrets.FOD_USER }}
          FOD_PASSWORD: ${{ secrets.FOD_PASSWORD }}
          FOD_CLIENT_ID: ${{ secrets.FOD_CLIENT_ID }}
          FOD_CLIENT_SECRET: ${{ secrets.FOD_CLIENT_SECRET }}

          # Optional / Fortify configuration
          SC_SAST_SENSOR_VERSION: 24.4.0
          DO_DEBRICKED_SCAN: true

          # Build info for Fortify release
          APP: ${{ github.repository }}
          REL: ${{ github.ref_name }}